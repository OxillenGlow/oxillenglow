<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2D Town Defender - Guns & Height</title>
    <style>
        :root {
            --bg: #1a1a2e;
            --surface: #16213e;
            --text: #e0e0e0;
            --accent: #4da6ff;
            --danger: #ff4d4d;
            --gold: #ffc107;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
            overflow-y: auto;
            padding: 10px;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .game-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            max-width: 850px;
            width: 100%;
        }

        .game-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            max-width: 100%;
            gap: 16px;
            flex-wrap: wrap;
        }

        .town-stats {
            display: flex;
            gap: 20px;
            align-items: center;
            flex-wrap: wrap;
        }

        .stat-card {
            background: var(--surface);
            border-radius: 12px;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            border: 2px solid transparent;
            transition: border-color 0.3s;
            min-width: 130px;
        }

        .stat-card.player {
            border-color: #4488ee;
        }
        .stat-card.enemy {
            border-color: #ee4444;
        }

        .stat-icon {
            width: 32px;
            height: 32px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: bold;
            color: #fff;
        }
        .stat-card.player .stat-icon {
            background: #4488ee;
        }
        .stat-card.enemy .stat-icon {
            background: #ee4444;
        }

        .stat-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .stat-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #aaa;
        }
        .stat-value {
            font-size: 15px;
            font-weight: 700;
            color: #fff;
        }

        .game-controls {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 8px 16px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            letter-spacing: 0.5px;
            transition: all 0.2s;
            font-family: inherit;
            text-transform: uppercase;
        }
        .btn-reset {
            background: #e74c3c;
            color: #fff;
        }
        .btn-reset:hover {
            background: #c0392b;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(231, 76, 60, 0.4);
        }
        .btn-info {
            background: var(--surface);
            color: var(--text);
            border: 1px solid #555;
            cursor: default;
            font-size: 11px;
            pointer-events: none;
            max-width: 180px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        canvas {
            border-radius: 12px;
            cursor: crosshair;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
            display: block;
            width: 100%;
            height: auto;
            border: 2px solid #333;
            background: #2d5a27;
        }

        .instructions {
            color: #999;
            font-size: 12px;
            text-align: center;
            letter-spacing: 0.5px;
            line-height: 1.6;
        }
        .instructions span {
            color: #ffc107;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="game-wrapper">
        <div class="game-header">
            <div class="town-stats">
                <div class="stat-card player">
                    <div class="stat-icon">🏰</div>
                    <div class="stat-info">
                        <span class="stat-label">Your Town</span>
                        <span class="stat-value" id="playerBuildings">8 🏠 | 16 ⚔️</span>
                    </div>
                </div>
                <div class="stat-card enemy">
                    <div class="stat-icon">🔥</div>
                    <div class="stat-info">
                        <span class="stat-label">Enemy Town</span>
                        <span class="stat-value" id="enemyBuildings">8 🏠 | 16 ⚔️</span>
                    </div>
                </div>
            </div>
            <div class="game-controls">
                <span class="btn btn-info" id="statusText">⚡ Select units</span>
                <button class="btn btn-reset" onclick="game.reset()">🔄 Restart</button>
            </div>
        </div>
        <canvas id="gameCanvas"></canvas>
        <div class="instructions">
            <span>🖱️ Drag</span> to select &nbsp;|&nbsp;
            <span>🖱️ Click</span> to move &nbsp;|&nbsp;
            <span>🖱️ Right-click</span> to attack-move &nbsp;|&nbsp;
            <span>⚔️</span> Guns auto-fire!
        </div>
    </div>

    <script>
        (function() {
            // ──────────────────────────────────────
            // CONSTANTS
            // ──────────────────────────────────────
            const GRID_SIZE = 20;
            const COLS = 80;
            const ROWS = 60;
            const CANVAS_WIDTH = COLS * GRID_SIZE;
            const CANVAS_HEIGHT = ROWS * GRID_SIZE;
            const BUILDING_SIZE = 3;
            const UNIT_SIZE = 16;
            const UNIT_SPEED = 110;
            const UNIT_HP = 70;
            const GUN_RANGE = 6 * GRID_SIZE; // 120 pixels
            const GUN_DAMAGE = 13;
            const GUN_COOLDOWN = 0.55;
            const BUILDING_HP = 220;
            const BUILDING_DAMAGE_RESIST = 0.7; // buildings take reduced gun damage
            const MAX_HEIGHT = 8;
            const TREE_PROBABILITY = 0.45; // in middle zone

            // ──────────────────────────────────────
            // CANVAS SETUP
            // ──────────────────────────────────────
            const canvas = document.getElementById('gameCanvas');
            canvas.width = CANVAS_WIDTH;
            canvas.height = CANVAS_HEIGHT;
            const ctx = canvas.getContext('2d');

            // ──────────────────────────────────────
            // GAME STATE
            // ──────────────────────────────────────
            let grid = []; // 0=walkable, 1=blocked (building or tree)
            let heightMap = []; // integer height per cell
            let treeGrid = []; // boolean: true if tree present
            let buildings = [];
            let units = [];
            let projectiles = [];
            let particles = [];
            let selectedUnits = [];
            let gameOver = false;
            let gameResult = '';
            let gameTime = 0;
            let aiTimer = 3;
            let aiWaveSize = 3;
            let lastAiReassign = 0;

            // Selection state
            let isDragging = false;
            let dragStartX = 0;
            let dragStartY = 0;
            let dragCurrentX = 0;
            let dragCurrentY = 0;
            let hasDragged = false;
            const DRAG_THRESHOLD = 5;

            // ──────────────────────────────────────
            // GRID & TERRAIN FUNCTIONS
            // ──────────────────────────────────────
            function initGrid() {
                grid = [];
                heightMap = [];
                treeGrid = [];
                const middleCol = COLS / 2;
                for (let row = 0; row < ROWS; row++) {
                    grid[row] = new Array(COLS).fill(0);
                    heightMap[row] = new Array(COLS).fill(0);
                    treeGrid[row] = new Array(COLS).fill(false);
                    for (let col = 0; col < COLS; col++) {
                        // Height: high on sides, low in middle (no man's land)
                        const distFromCenter = Math.abs(col - middleCol);
                        const maxDist = middleCol;
                        const height = Math.round(MAX_HEIGHT * (1 - distFromCenter / maxDist));
                        heightMap[row][col] = Math.max(0, Math.min(MAX_HEIGHT, height));
                    }
                }

                // Place trees in the middle columns (no man's land)
                const treeStartCol = Math.floor(COLS * 0.35);
                const treeEndCol = Math.floor(COLS * 0.65);
                for (let row = 0; row < ROWS; row++) {
                    for (let col = treeStartCol; col <= treeEndCol; col++) {
                        if (Math.random() < TREE_PROBABILITY) {
                            // Avoid placing trees right at the very edge of map to not block spawning
                            if (row > 1 && row < ROWS - 2 && col > 1 && col < COLS - 2) {
                                treeGrid[row][col] = true;
                                grid[row][col] = 1; // blocked for pathfinding
                            }
                        }
                    }
                }
                // Add a few scattered trees elsewhere for ambiance
                for (let i = 0; i < 200; i++) {
                    const col = Math.floor(Math.random() * COLS);
                    const row = Math.floor(Math.random() * ROWS);
                    if (col > 5 && col < COLS - 5 && row > 2 && row < ROWS - 2) {
                        if (Math.random() < 0.15 && !treeGrid[row][col]) {
                            treeGrid[row][col] = true;
                            grid[row][col] = 1;
                        }
                    }
                }
            }

            function markBuildingOnGrid(building, blocked) {
                for (let r = building.gridY; r < building.gridY + building.height; r++) {
                    for (let c = building.gridX; c < building.gridX + building.width; c++) {
                        if (r >= 0 && r < ROWS && c >= 0 && c < COLS) {
                            grid[r][c] = blocked ? 1 : 0;
                        }
                    }
                }
            }

            function isWalkable(gridCol, gridRow) {
                if (gridRow < 0 || gridRow >= ROWS || gridCol < 0 || gridCol >= COLS) return false;
                return grid[gridRow][gridCol] === 0;
            }

            function getGridCell(px, py) {
                const col = Math.floor(px / GRID_SIZE);
                const row = Math.floor(py / GRID_SIZE);
                return {
                    col: Math.max(0, Math.min(COLS - 1, col)),
                    row: Math.max(0, Math.min(ROWS - 1, row))
                };
            }

            function gridToPixelCenter(col, row) {
                return { x: col * GRID_SIZE + GRID_SIZE / 2, y: row * GRID_SIZE + GRID_SIZE / 2 };
            }

            // ──────────────────────────────────────
            // A* PATHFINDING (8-directional)
            // ──────────────────────────────────────
            function astar(startCol, startRow, goalCol, goalRow, gridRef) {
                if (gridRef[startRow][startCol] !== 0 || gridRef[goalRow][goalCol] !== 0) return null;
                if (startCol === goalCol && startRow === goalRow) return [{ x: goalCol, y: goalRow }];

                const openSet = new Map();
                const closedSet = new Set();
                const gScore = new Map();
                const parent = new Map();

                const key = (c, r) => r * COLS + c;
                const startKey = key(startCol, startRow);
                const goalKey = key(goalCol, goalRow);

                gScore.set(startKey, 0);
                const h = heuristic(startCol, startRow, goalCol, goalRow);
                openSet.set(startKey, { col: startCol, row: startRow, f: h });

                const dirs = [
                    { dc: 0, dr: -1, cost: 1 }, { dc: 1, dr: -1, cost: 1.414 }, { dc: 1, dr: 0, cost: 1 },
                    { dc: 1, dr: 1, cost: 1.414 }, { dc: 0, dr: 1, cost: 1 }, { dc: -1, dr: 1, cost: 1.414 },
                    { dc: -1, dr: 0, cost: 1 }, { dc: -1, dr: -1, cost: 1.414 }
                ];

                let iterations = 0;
                const maxIterations = COLS * ROWS * 2;

                while (openSet.size > 0 && iterations < maxIterations) {
                    iterations++;
                    let bestKey = null;
                    let bestF = Infinity;
                    for (const [k, node] of openSet) {
                        if (node.f < bestF) { bestF = node.f;
                            bestKey = k; }
                    }

                    const current = openSet.get(bestKey);
                    openSet.delete(bestKey);

                    if (current.col === goalCol && current.row === goalRow) {
                        const path = [];
                        let k = bestKey;
                        while (k !== startKey) {
                            const p = parent.get(k);
                            path.unshift({ x: p.col, y: p.row });
                            k = key(p.col, p.row);
                        }
                        path.push({ x: goalCol, y: goalRow });
                        if (path.length > 0 && path[0].x === startCol && path[0].y === startRow) path.shift();
                        return path;
                    }

                    closedSet.add(bestKey);
                    const gCurr = gScore.get(bestKey) || 0;

                    for (const dir of dirs) {
                        const nc = current.col + dir.dc;
                        const nr = current.row + dir.dr;
                        const nKey = key(nc, nr);
                        if (closedSet.has(nKey)) continue;
                        if (nr < 0 || nr >= ROWS || nc < 0 || nc >= COLS) continue;
                        if (gridRef[nr][nc] !== 0) continue;
                        if (dir.dc !== 0 && dir.dr !== 0) {
                            if (gridRef[current.row][nc] !== 0 || gridRef[nr][current.col] !== 0) continue;
                        }
                        const tentativeG = gCurr + dir.cost;
                        const existingG = gScore.get(nKey);
                        if (existingG === undefined || tentativeG < existingG) {
                            gScore.set(nKey, tentativeG);
                            const f = tentativeG + heuristic(nc, nr, goalCol, goalRow);
                            openSet.set(nKey, { col: nc, row: nr, f });
                            parent.set(nKey, { col: current.col, row: current.row });
                        }
                    }
                }
                return null;
            }

            function heuristic(c1, r1, c2, r2) {
                const dc = Math.abs(c1 - c2);
                const dr = Math.abs(r1 - r2);
                return Math.max(dc, dr) + (Math.SQRT2 - 1) * Math.min(dc, dr);
            }

            function findAdjacentWalkable(building, preferCol, preferRow) {
                const candidates = [];
                const bx = building.gridX,
                    by = building.gridY,
                    bw = building.width,
                    bh = building.height;
                for (let c = bx - 1; c <= bx + bw; c++) {
                    if (isWalkable(c, by - 1)) candidates.push({ col: c, row: by - 1 });
                    if (isWalkable(c, by + bh)) candidates.push({ col: c, row: by + bh });
                }
                for (let r = by; r < by + bh; r++) {
                    if (isWalkable(bx - 1, r)) candidates.push({ col: bx - 1, row: r });
                    if (isWalkable(bx + bw, r)) candidates.push({ col: bx + bw, row: r });
                }
                if (candidates.length === 0) {
                    for (let dr = -4; dr <= 4; dr++)
                        for (let dc = -4; dc <= 4; dc++)
                            if (isWalkable(bx + dc, by + dr)) candidates.push({ col: bx + dc, row: by + dr });
                }
                if (candidates.length === 0) return null;
                candidates.sort((a, b) => {
                    const da = Math.abs(a.col - preferCol) + Math.abs(a.row - preferRow);
                    const db = Math.abs(b.col - preferCol) + Math.abs(b.row - preferRow);
                    return da - db;
                });
                return candidates[0];
            }

            // ──────────────────────────────────────
            // BUILDING CLASS
            // ──────────────────────────────────────
            class Building {
                constructor(id, gridX, gridY, width, height, owner) {
                    this.id = id;
                    this.gridX = gridX;
                    this.gridY = gridY;
                    this.width = width;
                    this.height = height;
                    this.owner = owner;
                    this.hp = BUILDING_HP;
                    this.maxHp = BUILDING_HP;
                    this.alive = true;
                }

                get centerPixelX() { return (this.gridX + this.width / 2) * GRID_SIZE; }
                get centerPixelY() { return (this.gridY + this.height / 2) * GRID_SIZE; }
                get centerGridCol() { return this.gridX + Math.floor(this.width / 2); }
                get centerGridRow() { return this.gridY + Math.floor(this.height / 2); }

                containsGrid(col, row) {
                    return col >= this.gridX && col < this.gridX + this.width &&
                        row >= this.gridY && row < this.gridY + this.height;
                }

                takeDamage(amount) {
                    this.hp -= amount * BUILDING_DAMAGE_RESIST;
                    if (this.hp <= 0) {
                        this.hp = 0;
                        this.alive = false;
                        markBuildingOnGrid(this, false);
                        spawnDestructionParticles(this.centerPixelX, this.centerPixelY, this.owner);
                        return true;
                    }
                    return false;
                }
            }

            // ──────────────────────────────────────
            // UNIT CLASS
            // ──────────────────────────────────────
            class Unit {
                constructor(id, pixelX, pixelY, owner) {
                    this.id = id;
                    this.x = pixelX;
                    this.y = pixelY;
                    this.owner = owner;
                    this.hp = UNIT_HP;
                    this.maxHp = UNIT_HP;
                    this.speed = UNIT_SPEED;
                    this.path = [];
                    this.pathIndex = 0;
                    this.targetBuilding = null;
                    this.alive = true;
                    this.selected = false;
                    this.attackFlash = 0;
                    this.gunCooldown = 0;
                    this.currentTarget = null; // enemy unit or building
                    this.role = owner === 'ai' ? (Math.random() < 0.5 ? 'attacker' : 'defender') : null;
                    this.facingAngle = owner === 'player' ? 0 : Math.PI; // default facing
                }

                get gridCol() { return Math.floor(this.x / GRID_SIZE); }
                get gridRow() { return Math.floor(this.y / GRID_SIZE); }
                get height() { return heightMap[this.gridRow]?.[this.gridCol] || 0; }

                setPath(newPath) {
                    this.path = newPath || [];
                    this.pathIndex = 0;
                    this.targetBuilding = null;
                }

                setTargetBuilding(building) {
                    this.targetBuilding = building;
                    const cell = findAdjacentWalkable(building, this.gridCol, this.gridRow);
                    if (cell) {
                        const path = astar(this.gridCol, this.gridRow, cell.col, cell.row, grid);
                        this.path = path || [];
                        this.pathIndex = 0;
                    } else {
                        this.path = [];
                    }
                }

                update(dt) {
                    if (!this.alive) return;
                    if (this.gunCooldown > 0) this.gunCooldown -= dt;
                    if (this.attackFlash > 0) this.attackFlash -= dt;

                    // Follow path
                    if (this.path.length > 0 && this.pathIndex < this.path.length) {
                        const nextNode = this.path[this.pathIndex];
                        const targetPx = gridToPixelCenter(nextNode.x, nextNode.y);
                        const dx = targetPx.x - this.x;
                        const dy = targetPx.y - this.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < 3) {
                            this.pathIndex++;
                            if (this.pathIndex >= this.path.length) {
                                this.path = [];
                                this.pathIndex = 0;
                            }
                        } else {
                            const moveAmount = this.speed * dt;
                            const ratio = Math.min(moveAmount / dist, 1);
                            this.x += dx * ratio;
                            this.y += dy * ratio;
                            this.facingAngle = Math.atan2(dy, dx);
                        }
                    }

                    // Clamp
                    this.x = Math.max(UNIT_SIZE / 2, Math.min(CANVAS_WIDTH - UNIT_SIZE / 2, this.x));
                    this.y = Math.max(UNIT_SIZE / 2, Math.min(CANVAS_HEIGHT - UNIT_SIZE / 2, this.y));
                }

                takeDamage(amount) {
                    this.hp -= amount;
                    this.attackFlash = 0.12;
                    if (this.hp <= 0) {
                        this.hp = 0;
                        this.alive = false;
                        this.selected = false;
                        spawnDeathParticles(this.x, this.y, this.owner);
                        return true;
                    }
                    return false;
                }

                distanceTo(otherUnit) {
                    const dx = this.x - otherUnit.x;
                    const dy = this.y - otherUnit.y;
                    return Math.sqrt(dx * dx + dy * dy);
                }

                distanceToBuilding(building) {
                    const bx = building.gridX * GRID_SIZE;
                    const by = building.gridY * GRID_SIZE;
                    const bw = building.width * GRID_SIZE;
                    const bh = building.height * GRID_SIZE;
                    const cx = Math.max(bx, Math.min(this.x, bx + bw));
                    const cy = Math.max(by, Math.min(this.y, by + bh));
                    return Math.sqrt((this.x - cx) ** 2 + (this.y - cy) ** 2);
                }
            }

            // ──────────────────────────────────────
            // PROJECTILE CLASS
            // ──────────────────────────────────────
            class Projectile {
                constructor(startX, startY, targetUnit, targetBuilding, shooter) {
                    this.x = startX;
                    this.y = startY;
                    this.shooter = shooter;
                    this.targetUnit = targetUnit;
                    this.targetBuilding = targetBuilding;
                    this.speed = 400;
                    this.alive = true;
                    this.damage = GUN_DAMAGE;
                    // Pre-calculate aim direction
                    let aimX, aimY;
                    if (targetUnit) {
                        aimX = targetUnit.x;
                        aimY = targetUnit.y;
                    } else if (targetBuilding) {
                        aimX = targetBuilding.centerPixelX;
                        aimY = targetBuilding.centerPixelY;
                    } else {
                        this.alive = false;
                        return;
                    }
                    const dx = aimX - startX;
                    const dy = aimY - startY;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 1) { this.alive = false; return; }
                    this.vx = (dx / dist) * this.speed;
                    this.vy = (dy / dist) * this.speed;
                    this.trail = [];
                }

                update(dt) {
                    if (!this.alive) return;
                    const prevX = this.x;
                    const prevY = this.y;
                    this.x += this.vx * dt;
                    this.y += this.vy * dt;
                    this.trail.push({ x: this.x, y: this.y, life: 0.15 });
                    // Check collisions via grid traversal
                    const gridCol = Math.floor(this.x / GRID_SIZE);
                    const gridRow = Math.floor(this.y / GRID_SIZE);
                    if (gridRow < 0 || gridRow >= ROWS || gridCol < 0 || gridCol >= COLS) {
                        this.alive = false;
                        return;
                    }
                    // Check tree collision
                    if (treeGrid[gridRow]?.[gridCol]) {
                        this.alive = false;
                        return;
                    }
                    // Check building collision
                    const buildingHere = buildings.find(b => b.alive && b.containsGrid(gridCol, gridRow));
                    if (buildingHere && buildingHere !== this.shooter.targetBuilding) {
                        buildingHere.takeDamage(this.damage);
                        spawnAttackParticles(this.x, this.y, this.shooter.owner);
                        this.alive = false;
                        return;
                    }
                    // Check target unit hit
                    if (this.targetUnit && this.targetUnit.alive) {
                        const dist = Math.sqrt((this.x - this.targetUnit.x) ** 2 + (this.y - this.targetUnit.y) ** 2);
                        if (dist < UNIT_SIZE * 0.8) {
                            this.applyDamageToUnit(this.targetUnit);
                            this.alive = false;
                            return;
                        }
                    } else if (this.targetBuilding && this.targetBuilding.alive) {
                        const dist = Math.sqrt((this.x - this.targetBuilding.centerPixelX) ** 2 + (this.y - this
                            .targetBuilding.centerPixelY) ** 2);
                        if (dist < GRID_SIZE * 2) {
                            this.targetBuilding.takeDamage(this.damage);
                            spawnAttackParticles(this.x, this.y, this.shooter.owner);
                            this.alive = false;
                            return;
                        }
                    }
                    // Timeout
                    if (this.x < 0 || this.x > CANVAS_WIDTH || this.y < 0 || this.y > CANVAS_HEIGHT) {
                        this.alive = false;
                    }
                }

                applyDamageToUnit(unit) {
                    const shooterHeight = this.shooter.height;
                    const targetHeight = unit.height;
                    const dist = this.shooter.distanceTo(unit);
                    const distFactor = Math.max(0.3, 1 - dist / GUN_RANGE);
                    const heightAdv = 1 + Math.max(0, (shooterHeight - targetHeight) * 0.15);
                    const finalDamage = this.damage * distFactor * heightAdv;
                    unit.takeDamage(finalDamage);
                    spawnAttackParticles(this.x, this.y, this.shooter.owner);
                }
            }

            // ──────────────────────────────────────
            // PARTICLE SYSTEM
            // ──────────────────────────────────────
            class Particle {
                constructor(x, y, color, life, vx, vy, size) {
                    this.x = x;
                    this.y = y;
                    this.color = color;
                    this.life = life;
                    this.maxLife = life;
                    this.vx = vx || 0;
                    this.vy = vy || 0;
                    this.size = size || 3;
                    this.alive = true;
                }
                update(dt) {
                    this.life -= dt;
                    if (this.life <= 0) this.alive = false;
                    this.x += this.vx * dt;
                    this.y += this.vy * dt;
                    this.vy += 50 * dt;
                }
                draw(ctx) {
                    const alpha = Math.max(0, this.life / this.maxLife);
                    ctx.fillStyle = this.color.replace('1)', `${alpha})`).replace('rgb', 'rgba');
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size * alpha, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            function spawnDestructionParticles(x, y, owner) {
                const color = owner === 'player' ? 'rgb(255,180,50)' : 'rgb(255,80,50)';
                for (let i = 0; i < 30; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = 40 + Math.random() * 200;
                    particles.push(new Particle(x, y, color, 0.5 + Math.random() * 0.7, Math.cos(angle) * speed, Math.sin(
                        angle) * speed - 70, 2 + Math.random() * 6));
                }
            }

            function spawnDeathParticles(x, y, owner) {
                const color = owner === 'player' ? 'rgb(100,180,255)' : 'rgb(255,100,100)';
                for (let i = 0; i < 12; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = 20 + Math.random() * 90;
                    particles.push(new Particle(x, y, color, 0.25 + Math.random() * 0.4, Math.cos(angle) * speed, Math.sin(
                        angle) * speed - 40, 1.5 + Math.random() * 4));
                }
            }

            function spawnAttackParticles(x, y, owner) {
                const color = owner === 'player' ? 'rgb(200,220,255)' : 'rgb(255,200,180)';
                for (let i = 0; i < 5; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = 15 + Math.random() * 60;
                    particles.push(new Particle(x, y, color, 0.1 + Math.random() * 0.25, Math.cos(angle) * speed, Math.sin(
                        angle) * speed, 1 + Math.random() * 3));
                }
            }

            // ──────────────────────────────────────
            // GAME INITIALIZATION
            // ──────────────────────────────────────
            function createBuildings() {
                buildings = [];
                let bid = 0;
                // Player buildings (left side) - 8 buildings
                const playerPositions = [
                    [3, 3],
                    [3, 10],
                    [3, 17],
                    [3, 24],
                    [10, 3],
                    [10, 10],
                    [10, 17],
                    [10, 24]
                ];
                // AI buildings (right side) - 8 buildings
                const aiPositions = [
                    [67, 3],
                    [67, 10],
                    [67, 17],
                    [67, 24],
                    [74, 3],
                    [74, 10],
                    [74, 17],
                    [74, 24]
                ];
                for (const [gx, gy] of playerPositions)
                    buildings.push(new Building(bid++, gx, gy, BUILDING_SIZE, BUILDING_SIZE, 'player'));
                for (const [gx, gy] of aiPositions)
                    buildings.push(new Building(bid++, gx, gy, BUILDING_SIZE, BUILDING_SIZE, 'ai'));
                for (const b of buildings) markBuildingOnGrid(b, true);
            }

            function createUnits() {
                units = [];
                let uid = 0;
                // Player spawn points near buildings
                const playerSpawns = [];
                for (let row = 2; row < 28; row += 4)
                    for (let col = 5; col < 14; col += 3)
                        if (isWalkable(col, row)) playerSpawns.push([col * GRID_SIZE + GRID_SIZE / 2, row * GRID_SIZE +
                            GRID_SIZE / 2
                        ]);
                // AI spawn points
                const aiSpawns = [];
                for (let row = 2; row < 28; row += 4)
                    for (let col = 66; col < 78; col += 3)
                        if (isWalkable(col, row)) aiSpawns.push([col * GRID_SIZE + GRID_SIZE / 2, row * GRID_SIZE + GRID_SIZE /
                            2
                        ]);

                for (let i = 0; i < 16; i++) {
                    if (i < playerSpawns.length) {
                        const [px, py] = playerSpawns[i];
                        units.push(new Unit(uid++, px, py, 'player'));
                    }
                    if (i < aiSpawns.length) {
                        const [px, py] = aiSpawns[i];
                        units.push(new Unit(uid++, px, py, 'ai'));
                    }
                }
                // Ensure we have at least 16 each
                while (units.filter(u => u.owner === 'player').length < 16) {
                    const b = buildings.find(b => b.owner === 'player' && b.alive);
                    if (b) units.push(new Unit(uid++, b.centerPixelX + 20, b.centerPixelY, 'player'));
                }
                while (units.filter(u => u.owner === 'ai').length < 16) {
                    const b = buildings.find(b => b.owner === 'ai' && b.alive);
                    if (b) units.push(new Unit(uid++, b.centerPixelX - 20, b.centerPixelY, 'ai'));
                }
            }

            function resetGame() {
                initGrid();
                buildings = [];
                units = [];
                projectiles = [];
                particles = [];
                selectedUnits = [];
                gameOver = false;
                gameResult = '';
                gameTime = 0;
                aiTimer = 2.5 + Math.random() * 3;
                aiWaveSize = 3;
                lastAiReassign = 0;
                isDragging = false;
                hasDragged = false;
                createBuildings();
                createUnits();
                updateUI();
            }

            // ──────────────────────────────────────
            // COMBAT & TARGETING
            // ──────────────────────────────────────
            function findNearestEnemy(unit) {
                let bestDist = GUN_RANGE;
                let bestTarget = null;
                // Enemy units
                for (const other of units) {
                    if (!other.alive || other.owner === unit.owner) continue;
                    const dist = unit.distanceTo(other);
                    if (dist < bestDist) { bestDist = dist;
                        bestTarget = other; }
                }
                // Enemy buildings
                for (const building of buildings) {
                    if (!building.alive || building.owner === unit.owner) continue;
                    const dist = unit.distanceToBuilding(building);
                    if (dist < bestDist) { bestDist = dist;
                        bestTarget = building; }
                }
                return bestTarget;
            }

            function unitShoot(unit) {
                if (!unit.alive || unit.gunCooldown > 0) return;
                const target = findNearestEnemy(unit);
                if (!target) return;
                unit.gunCooldown = GUN_COOLDOWN;
                let targetUnit = null,
                    targetBuilding = null;
                if (target instanceof Unit) targetUnit = target;
                else targetBuilding = target;
                const proj = new Projectile(unit.x, unit.y, targetUnit, targetBuilding, unit);
                if (proj.alive) projectiles.push(proj);
                unit.facingAngle = Math.atan2(
                    (target instanceof Unit ? target.y : target.centerPixelY) - unit.y,
                    (target instanceof Unit ? target.x : target.centerPixelX) - unit.x
                );
            }

            // ──────────────────────────────────────
            // AI SYSTEM
            // ──────────────────────────────────────
            function updateAI(dt) {
                if (gameOver) return;
                aiTimer -= dt;
                if (aiTimer <= 0) {
                    aiTimer = 3 + Math.random() * 4;
                    launchAIWave();
                }

                const aiUnits = units.filter(u => u.alive && u.owner === 'ai');
                const playerBuildingsAlive = buildings.filter(b => b.alive && b.owner === 'player');
                const aiBuildingsAlive = buildings.filter(b => b.alive && b.owner === 'ai');

                // Reassign roles periodically (every 2 sec)
                lastAiReassign += dt;
                if (lastAiReassign > 2) {
                    lastAiReassign = 0;
                    const totalAi = aiUnits.length;
                    const desiredDefenders = Math.ceil(totalAi * 0.4);
                    let defenderCount = aiUnits.filter(u => u.role === 'defender').length;
                    // Adjust roles
                    for (const unit of aiUnits) {
                        if (defenderCount < desiredDefenders && unit.role !== 'defender') {
                            unit.role = 'defender';
                            defenderCount++;
                        } else if (defenderCount > desiredDefenders && unit.role === 'defender') {
                            unit.role = 'attacker';
                            defenderCount--;
                        }
                    }
                }

                // Assign orders based on role
                for (const unit of aiUnits) {
                    if (unit.path.length > 0 || unit.targetBuilding) continue; // already busy
                    if (unit.role === 'defender') {
                        // Patrol near a friendly building
                        if (aiBuildingsAlive.length > 0) {
                            const defendBuild = aiBuildingsAlive[Math.floor(Math.random() * aiBuildingsAlive.length)];
                            const cell = findAdjacentWalkable(defendBuild, unit.gridCol, unit.gridRow);
                            if (cell) {
                                const path = astar(unit.gridCol, unit.gridRow, cell.col, cell.row, grid);
                                if (path) unit.setPath(path);
                            }
                        }
                    } else {
                        // Attacker: go after enemy buildings
                        if (playerBuildingsAlive.length > 0) {
                            const targetBuild = playerBuildingsAlive[Math.floor(Math.random() * playerBuildingsAlive
                            .length)];
                            unit.setTargetBuilding(targetBuild);
                        }
                    }
                }
            }

            function launchAIWave() {
                if (gameOver) return;
                const attackers = units.filter(u => u.alive && u.owner === 'ai' && u.role === 'attacker' && u.path
                .length === 0);
                const wave = attackers.slice(0, aiWaveSize);
                const playerBuildingsAlive = buildings.filter(b => b.alive && b.owner === 'player');
                if (wave.length > 0 && playerBuildingsAlive.length > 0) {
                    const target = playerBuildingsAlive[Math.floor(Math.random() * playerBuildingsAlive.length)];
                    for (const unit of wave) unit.setTargetBuilding(target);
                }
                aiWaveSize = Math.min(8, aiWaveSize + 0.4);
            }

            // ──────────────────────────────────────
            // SELECTION & INPUT
            // ──────────────────────────────────────
            function getCanvasMousePos(e) {
                const rect = canvas.getBoundingClientRect();
                const scaleX = CANVAS_WIDTH / rect.width;
                const scaleY = CANVAS_HEIGHT / rect.height;
                return {
                    x: (e.clientX - rect.left) * scaleX,
                    y: (e.clientY - rect.top) * scaleY
                };
            }

            function selectUnitsInRect(x1, y1, x2, y2) {
                const left = Math.min(x1, x2),
                    right = Math.max(x1, x2),
                    top = Math.min(y1, y2),
                    bottom = Math.max(y1, y2);
                selectedUnits = [];
                for (const unit of units) {
                    if (unit.alive && unit.owner === 'player') {
                        if (unit.x >= left && unit.x <= right && unit.y >= top && unit.y <= bottom) {
                            unit.selected = true;
                            selectedUnits.push(unit);
                        } else unit.selected = false;
                    }
                }
            }

            function clearSelection() {
                for (const u of selectedUnits) u.selected = false;
                selectedUnits = [];
            }

            function moveSelectedUnits(targetCol, targetRow, isAttackMove) {
                if (selectedUnits.length === 0) return;
                let clickedBuilding = buildings.find(b => b.alive && b.containsGrid(targetCol, targetRow));
                let clickedEnemyUnit = null;
                if (!clickedBuilding) {
                    clickedEnemyUnit = units.find(u => u.alive && u.owner !== 'player' && u.gridCol === targetCol && u
                        .gridRow === targetRow);
                }

                if (clickedBuilding && clickedBuilding.owner === 'ai') {
                    for (const unit of selectedUnits) unit.setTargetBuilding(clickedBuilding);
                } else if (clickedEnemyUnit && isAttackMove) {
                    for (const unit of selectedUnits) {
                        const path = astar(unit.gridCol, unit.gridRow, targetCol, targetRow, grid);
                        unit.setPath(path);
                    }
                } else if (clickedBuilding && clickedBuilding.owner === 'player') {
                    for (const unit of selectedUnits) {
                        const cell = findAdjacentWalkable(clickedBuilding, targetCol, targetRow);
                        if (cell) {
                            const path = astar(unit.gridCol, unit.gridRow, cell.col, cell.row, grid);
                            unit.setPath(path);
                        }
                    }
                } else {
                    if (!isWalkable(targetCol, targetRow)) {
                        let bestCell = null,
                            bestDist = Infinity;
                        for (let dr = -3; dr <= 3; dr++) {
                            for (let dc = -3; dc <= 3; dc++) {
                                const c = targetCol + dc,
                                    r = targetRow + dr;
                                if (isWalkable(c, r)) {
                                    const dist = Math.abs(dc) + Math.abs(dr);
                                    if (dist < bestDist) { bestDist = dist;
                                        bestCell = { col: c, row: r }; }
                                }
                            }
                        }
                        if (bestCell) { targetCol = bestCell.col;
                            targetRow = bestCell.row; } else return;
                    }
                    const offsets = getFormationOffsets(selectedUnits.length);
                    for (let i = 0; i < selectedUnits.length; i++) {
                        const unit = selectedUnits[i];
                        const off = offsets[i] || { dc: 0, dr: 0 };
                        const destCol = Math.max(0, Math.min(COLS - 1, targetCol + off.dc));
                        const destRow = Math.max(0, Math.min(ROWS - 1, targetRow + off.dr));
                        const finalCol = isWalkable(destCol, destRow) ? destCol : targetCol;
                        const finalRow = isWalkable(destCol, destRow) ? destRow : targetRow;
                        const path = astar(unit.gridCol, unit.gridRow, finalCol, finalRow, grid);
                        unit.setPath(path);
                    }
                }
            }

            function getFormationOffsets(count) {
                const offsets = [];
                const radius = Math.ceil(Math.sqrt(count));
                for (let dr = -radius; dr <= radius; dr++)
                    for (let dc = -radius; dc <= radius; dc++)
                        if (Math.abs(dr) <= radius && Math.abs(dc) <= radius) offsets.push({ dc, dr });
                offsets.sort((a, b) => (Math.abs(a.dc) + Math.abs(a.dr)) - (Math.abs(b.dc) + Math.abs(b.dr)));
                return offsets.slice(0, count);
            }

            canvas.addEventListener('mousedown', (e) => {
                if (gameOver) return;
                const pos = getCanvasMousePos(e);
                dragStartX = pos.x;
                dragStartY = pos.y;
                dragCurrentX = pos.x;
                dragCurrentY = pos.y;
                isDragging = true;
                hasDragged = false;
            });
            canvas.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                const pos = getCanvasMousePos(e);
                dragCurrentX = pos.x;
                dragCurrentY = pos.y;
                if (Math.hypot(dragCurrentX - dragStartX, dragCurrentY - dragStartY) > DRAG_THRESHOLD) hasDragged = true;
            });
            canvas.addEventListener('mouseup', (e) => {
                if (!isDragging) return;
                isDragging = false;
                if (hasDragged) {
                    selectUnitsInRect(dragStartX, dragStartY, dragCurrentX, dragCurrentY);
                } else {
                    const pos = getCanvasMousePos(e);
                    const cell = getGridCell(pos.x, pos.y);
                    if (selectedUnits.length > 0) {
                        moveSelectedUnits(cell.col, cell.row, false);
                    } else {
                        let clickedUnit = null,
                            closestDist = GRID_SIZE * 1.8;
                        for (const unit of units) {
                            if (unit.alive && unit.owner === 'player') {
                                const dist = Math.hypot(unit.x - pos.x, unit.y - pos.y);
                                if (dist < closestDist) { closestDist = dist;
                                    clickedUnit = unit; }
                            }
                        }
                        if (clickedUnit) {
                            clearSelection();
                            clickedUnit.selected = true;
                            selectedUnits = [clickedUnit];
                        } else clearSelection();
                    }
                }
                updateUI();
            });
            canvas.addEventListener('contextmenu', (e) => {
                e.preventDefault();
                if (gameOver) return;
                const pos = getCanvasMousePos(e);
                const cell = getGridCell(pos.x, pos.y);
                if (selectedUnits.length > 0) moveSelectedUnits(cell.col, cell.row, true);
                updateUI();
            });
            // Touch support
            canvas.addEventListener('touchstart', (e) => {
                if (gameOver) return;
                if (e.touches.length === 1) {
                    const t = e.touches[0];
                    const pos = getCanvasMousePos(t);
                    dragStartX = pos.x;
                    dragStartY = pos.y;
                    dragCurrentX = pos.x;
                    dragCurrentY = pos.y;
                    isDragging = true;
                    hasDragged = false;
                }
                e.preventDefault();
            }, { passive: false });
            canvas.addEventListener('touchmove', (e) => {
                if (!isDragging) return;
                if (e.touches.length === 1) {
                    const t = e.touches[0];
                    const pos = getCanvasMousePos(t);
                    dragCurrentX = pos.x;
                    dragCurrentY = pos.y;
                    if (Math.hypot(dragCurrentX - dragStartX, dragCurrentY - dragStartY) > DRAG_THRESHOLD) hasDragged = true;
                }
                e.preventDefault();
            }, { passive: false });
            canvas.addEventListener('touchend', (e) => {
                if (!isDragging) return;
                isDragging = false;
                if (hasDragged) {
                    selectUnitsInRect(dragStartX, dragStartY, dragCurrentX, dragCurrentY);
                } else {
                    const pos = { x: dragStartX, y: dragStartY };
                    const cell = getGridCell(pos.x, pos.y);
                    if (selectedUnits.length > 0) {
                        moveSelectedUnits(cell.col, cell.row, false);
                    } else {
                        let clickedUnit = null,
                            closestDist = GRID_SIZE * 1.8;
                        for (const unit of units) {
                            if (unit.alive && unit.owner === 'player') {
                                const dist = Math.hypot(unit.x - pos.x, unit.y - pos.y);
                                if (dist < closestDist) { closestDist = dist;
                                    clickedUnit = unit; }
                            }
                        }
                        if (clickedUnit) {
                            clearSelection();
                            clickedUnit.selected = true;
                            selectedUnits = [clickedUnit];
                        } else clearSelection();
                    }
                }
                updateUI();
                e.preventDefault();
            }, { passive: false });

            // ──────────────────────────────────────
            // UI UPDATE
            // ──────────────────────────────────────
            function updateUI() {
                const playerB = buildings.filter(b => b.alive && b.owner === 'player').length;
                const aiB = buildings.filter(b => b.alive && b.owner === 'ai').length;
                const playerU = units.filter(u => u.alive && u.owner === 'player').length;
                const aiU = units.filter(u => u.alive && u.owner === 'ai').length;
                document.getElementById('playerBuildings').textContent = `${playerB} 🏠 | ${playerU} ⚔️`;
                document.getElementById('enemyBuildings').textContent = `${aiB} 🏠 | ${aiU} ⚔️`;
                const status = document.getElementById('statusText');
                if (gameOver) status.textContent = gameResult;
                else if (selectedUnits.length > 0) status.textContent = `🎯 ${selectedUnits.length} selected`;
                else status.textContent = '⚡ Select units';
            }

            // ──────────────────────────────────────
            // RENDERING
            // ──────────────────────────────────────
            function drawGround() {
                for (let row = 0; row < ROWS; row++) {
                    for (let col = 0; col < COLS; col++) {
                        const h = heightMap[row][col];
                        const lightness = 35 + h * 7;
                        ctx.fillStyle = `hsl(90, 45%, ${lightness}%)`;
                        ctx.fillRect(col * GRID_SIZE, row * GRID_SIZE, GRID_SIZE, GRID_SIZE);
                    }
                }
                // Grid lines
                ctx.strokeStyle = 'rgba(0,0,0,0.06)';
                ctx.lineWidth = 0.5;
                for (let c = 0; c <= COLS; c++) {
                    ctx.beginPath();
                    ctx.moveTo(c * GRID_SIZE, 0);
                    ctx.lineTo(c * GRID_SIZE, CANVAS_HEIGHT);
                    ctx.stroke();
                }
                for (let r = 0; r <= ROWS; r++) {
                    ctx.beginPath();
                    ctx.moveTo(0, r * GRID_SIZE);
                    ctx.lineTo(CANVAS_WIDTH, r * GRID_SIZE);
                    ctx.stroke();
                }
            }

            function drawTrees() {
                for (let row = 0; row < ROWS; row++) {
                    for (let col = 0; col < COLS; col++) {
                        if (treeGrid[row][col]) {
                            const cx = col * GRID_SIZE + GRID_SIZE / 2;
                            const cy = row * GRID_SIZE + GRID_SIZE / 2;
                            ctx.fillStyle = '#2d5a1e';
                            ctx.beginPath();
                            ctx.arc(cx, cy - 4, 8, 0, Math.PI * 2);
                            ctx.fill();
                            ctx.fillStyle = '#1e3e12';
                            ctx.beginPath();
                            ctx.arc(cx - 3, cy - 2, 6, 0, Math.PI * 2);
                            ctx.fill();
                            ctx.fillStyle = '#4a3620';
                            ctx.fillRect(cx - 2, cy - 2, 4, 8);
                        }
                    }
                }
            }

            function drawBuilding(building) {
                const x = building.gridX * GRID_SIZE;
                const y = building.gridY * GRID_SIZE;
                const w = building.width * GRID_SIZE;
                const h = building.height * GRID_SIZE;
                ctx.fillStyle = 'rgba(0,0,0,0.3)';
                ctx.fillRect(x + 3, y + 3, w, h);
                const hpRatio = building.hp / building.maxHp;
                const baseColor = building.owner === 'player' ? '#3366cc' : '#cc3333';
                const damagedColor = building.owner === 'player' ? '#1a3a6e' : '#6e1a1a';
                const color = lerpColor(damagedColor, baseColor, hpRatio);
                ctx.fillStyle = color;
                ctx.fillRect(x, y, w, h);
                ctx.strokeStyle = building.owner === 'player' ? '#5599ee' : '#ee5555';
                ctx.lineWidth = 2;
                ctx.strokeRect(x, y, w, h);
                ctx.fillStyle = building.owner === 'player' ? 'rgba(100,160,255,0.5)' : 'rgba(255,100,100,0.5)';
                ctx.fillRect(x + 4, y + 4, w - 8, h / 3);
                if (hpRatio < 1) {
                    const barW = w - 6;
                    ctx.fillStyle = 'rgba(0,0,0,0.6)';
                    ctx.fillRect(x + 3, y - 10, barW + 2, 6);
                    ctx.fillStyle = hpRatio > 0.5 ? '#4caf50' : hpRatio > 0.25 ? '#ff9800' : '#f44336';
                    ctx.fillRect(x + 4, y - 9, barW * hpRatio, 4);
                }
            }

            function drawUnit(unit) {
                if (!unit.alive) return;
                const size = UNIT_SIZE;
                const half = size / 2;
                const x = unit.x - half;
                const y = unit.y - half;
                if (unit.selected) {
                    const pulse = 1 + Math.sin(gameTime * 6) * 0.3;
                    ctx.fillStyle = 'rgba(255,255,100,0.5)';
                    ctx.fillRect(x - 6 * pulse, y - 6 * pulse, size + 12 * pulse, size + 12 * pulse);
                }
                ctx.fillStyle = 'rgba(0,0,0,0.3)';
                ctx.fillRect(x + 2, y + 2, size, size);
                const bodyColor = unit.owner === 'player' ? '#5599ff' : '#ff5555';
                ctx.fillStyle = unit.attackFlash > 0 ? '#ffffff' : bodyColor;
                ctx.fillRect(x, y, size, size);
                ctx.strokeStyle = unit.owner === 'player' ? '#3377dd' : '#dd3333';
                ctx.lineWidth = 1.5;
                ctx.strokeRect(x, y, size, size);
                // Gun
                const gunLength = 9;
                const gunX = unit.x + Math.cos(unit.facingAngle) * half;
                const gunY = unit.y + Math.sin(unit.facingAngle) * half;
                const tipX = unit.x + Math.cos(unit.facingAngle) * (half + gunLength);
                const tipY = unit.y + Math.sin(unit.facingAngle) * (half + gunLength);
                ctx.strokeStyle = '#5c4033';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(gunX, gunY);
                ctx.lineTo(tipX, tipY);
                ctx.stroke();
                ctx.fillStyle = '#3a2a1a';
                ctx.beginPath();
                ctx.arc(tipX, tipY, 2.5, 0, Math.PI * 2);
                ctx.fill();
            }

            function drawProjectiles() {
                for (const proj of projectiles) {
                    ctx.fillStyle = '#ffdd44';
                    ctx.beginPath();
                    ctx.arc(proj.x, proj.y, 2.5, 0, Math.PI * 2);
                    ctx.fill();
                    for (const t of proj.trail) {
                        ctx.fillStyle = `rgba(255,200,0,${t.life*2})`;
                        ctx.beginPath();
                        ctx.arc(t.x, t.y, 1.5, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
            }

            function drawSelectionBox() {
                if (!isDragging || !hasDragged) return;
                const x = Math.min(dragStartX, dragCurrentX),
                    y = Math.min(dragStartY, dragCurrentY);
                const w = Math.abs(dragCurrentX - dragStartX),
                    h = Math.abs(dragCurrentY - dragStartY);
                ctx.fillStyle = 'rgba(100,200,255,0.15)';
                ctx.fillRect(x, y, w, h);
                ctx.strokeStyle = 'rgba(150,220,255,0.8)';
                ctx.lineWidth = 1.5;
                ctx.setLineDash([6, 3]);
                ctx.strokeRect(x, y, w, h);
                ctx.setLineDash([]);
            }

            function drawGameOver() {
                if (!gameOver) return;
                ctx.fillStyle = 'rgba(0,0,0,0.7)';
                ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
                ctx.fillStyle = gameResult.includes('Victory') ? '#ffd700' : '#ff4444';
                ctx.font = 'bold 52px "Segoe UI"';
                ctx.textAlign = 'center';
                ctx.fillText(gameResult.includes('Victory') ? '🏆 VICTORY! 🏆' : '💀 DEFEAT! 💀', CANVAS_WIDTH / 2, CANVAS_HEIGHT /
                    2 - 20);
                ctx.fillStyle = '#fff';
                ctx.font = '20px "Segoe UI"';
                ctx.fillText('Click "Restart" to play again', CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2 + 30);
                ctx.textAlign = 'start';
            }

            function render() {
                ctx.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
                drawGround();
                drawTrees();
                for (const b of buildings) if (b.alive) drawBuilding(b);
                for (const u of units) drawUnit(u);
                drawProjectiles();
                for (const p of particles) p.draw(ctx);
                drawSelectionBox();
                drawGameOver();
                // Info text
                ctx.fillStyle = 'rgba(0,0,0,0.6)';
                ctx.fillRect(4, CANVAS_HEIGHT - 28, 200, 24);
                ctx.fillStyle = '#fff';
                ctx.font = '12px "Segoe UI"';
                ctx.textAlign = 'left';
                ctx.fillText(`⏱ ${Math.floor(gameTime)}s | Wave: ${Math.floor(aiWaveSize)}`, 10, CANVAS_HEIGHT - 10);
            }

            function lerpColor(c1, c2, t) {
                const r1 = parseInt(c1.slice(1, 3), 16),
                    g1 = parseInt(c1.slice(3, 5), 16),
                    b1 = parseInt(c1.slice(5, 7), 16);
                const r2 = parseInt(c2.slice(1, 3), 16),
                    g2 = parseInt(c2.slice(3, 5), 16),
                    b2 = parseInt(c2.slice(5, 7), 16);
                return `rgb(${Math.round(r1+(r2-r1)*t)},${Math.round(g1+(g2-g1)*t)},${Math.round(b1+(b2-b1)*t)})`;
            }

            // ──────────────────────────────────────
            // GAME LOOP
            // ──────────────────────────────────────
            let lastTime = performance.now();

            function gameLoop(timestamp) {
                let dt = (timestamp - lastTime) / 1000;
                lastTime = timestamp;
                if (dt > 0.2) dt = 0.2;
                if (dt <= 0) dt = 0.016;
                if (!gameOver) {
                    gameTime += dt;
                    for (const unit of units) unit.update(dt);
                    // Gun shooting
                    for (const unit of units) {
                        if (unit.alive && unit.gunCooldown <= 0) unitShoot(unit);
                    }
                    // Update projectiles
                    for (const proj of projectiles) proj.update(dt);
                    projectiles = projectiles.filter(p => p.alive);
                    // Update particles
                    for (const p of particles) p.update(dt);
                    particles = particles.filter(p => p.alive);
                    // Update AI
                    updateAI(dt);
                    // Clean selection
                    selectedUnits = selectedUnits.filter(u => u.alive);
                    // Check win/lose
                    const playerB = buildings.filter(b => b.alive && b.owner === 'player');
                    const aiB = buildings.filter(b => b.alive && b.owner === 'ai');
                    const playerU = units.filter(u => u.alive && u.owner === 'player');
                    const aiU = units.filter(u => u.alive && u.owner === 'ai');
                    if (aiB.length === 0 && aiU.length === 0) {
                        gameOver = true;
                        gameResult = '🏆 Total Victory!';
                    } else if (aiB.length === 0) {
                        gameOver = true;
                        gameResult = '🏆 Victory! Enemy buildings destroyed!';
                    } else if (playerB.length === 0) {
                        gameOver = true;
                        gameResult = '💀 Defeat! Your buildings destroyed!';
                    } else if (playerU.length === 0 && aiU.length > 0) {
                        gameOver = true;
                        gameResult = '💀 Defeat! All your units lost!';
                    }
                    updateUI();
                }
                render();
                requestAnimationFrame(gameLoop);
            }

            window.game = { reset: () => { resetGame();
                    lastTime = performance.now(); } };
            resetGame();
            lastTime = performance.now();
            requestAnimationFrame(gameLoop);
        })();
    </script>
</body>
</html>
